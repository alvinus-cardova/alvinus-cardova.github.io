  #     POSTGRES_DB: cctv_db
  #     POSTGRES_USER: cctv_user
  #     POSTGRES_PASSWORD: cctv_password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - cctv-network
  #   restart: unless-stopped

  # Optional: Redis for caching
  # redis:
  #   image: redis:6-alpine
